	var key = window.prompt('請輸入解密金鑰');
	if(key){
		var hkey = CryptoJS.enc.Hex.parse(sha256(key));
		var dec = CryptoJS.AES.decrypt({ciphertext:CryptoJS.enc.Base64.parse(ENC_DATA)}, hkey,{mode:CryptoJS.mode.CBC, padding:CryptoJS.pad.Pkcs7, iv:IV});
		if(dec.words[0] === 105501){
			saveAs(new Blob([Word2Int(dec,4)], {type : 'application/octet-stream'}), NAME);
			return true;
		}else{
			alert('解密金鑰有誤');
			return false;
		}
	}
}
function Word2Int(word, offset){
	var words = word.words;
	var len = words.length;
	var result = new Uint8Array(len*4);
	for(var i = 0; i < len; i++){
		var j = 4*i;
		result[j] = (words[i]&0xff000000) >>> 24;
		result[j+1] = (words[i]&0x00ff0000) >>> 16;
		result[j+2] = (words[i]&0x0000ff00) >>> 8;
		result[j+3] = (words[i]&0x000000ff)
	}
	return result.slice(offset || 0, word.sigBytes);
}
