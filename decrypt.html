<html>
<head>
<title>(version:20260630)</title>
<meta charset="UTF-8">
<script>
function init(){
	document.getElementById('decrypt').addEventListener('click', function(){
		readSingleFile(document.getElementById('files'));
	}, false);
	document.getElementById('filedrag').addEventListener("drop", function(e){
		fileDragHover(e);
		readSingleFile(e.dataTransfer);
	}, false);
	document.getElementById('filedrag').addEventListener("dragover", fileDragHover, false);
	document.getElementById('filedrag').addEventListener("dragleave", fileDragHover, false);
};
function fileDragHover(e){
	e.stopPropagation();
	e.preventDefault();
	e.target.className = (e.type == "dragover" ? "hover" : "");
}
function readSingleFile(e) {
	disable();
	var file = e.files[0];
	if (!file){
		alert('No file');
		enable();
		return;
	}
	var reader = new FileReader();
	reader.onload = function(e) {
		decrypt(reader.result);
		enable();
	};
	reader.onerror = function(event) {
		alert(event.target.error.message);
		reader.abort();
		enable();
	};
	reader.readAsText(file);
}
function fromHexString(hexString){
	return Uint8Array.from(hexString.match(/.{1,2}/g).map((byte) => parseInt(byte, 16)));
}
function decrypt(s){
	var key = window.prompt('請輸入解密金鑰');
	if(key){
		var hkey = fromHexString(sha256(key));
		var data = JSON.parse(s);
		
		window.crypto.subtle.importKey('raw', hkey, 'aes-gcm', true, ["encrypt", "decrypt"]).then(function(key){
			return window.crypto.subtle.decrypt(
				{ name: "AES-GCM", iv: Base64.toUint8Array(data.iv) },
				key,
				Base64.toUint8Array(data.cipher)
			);
		}).then(function(r){
			saveAs(new Blob([r], {type: "application/octet-stream"}), data.name);
		}).catch(function(err){
			alert('解密失敗');
		});
	}
}
function disable(){
	document.getElementById('filedrag').disabled = true;
	document.getElementById('decrypt').disabled = true;
	document.getElementById('decrypt').style.display = 'none';
	document.getElementById('decspan').style.display = '';
}
function enable(){
	document.getElementById('decrypt').disabled = false;
	document.getElementById('decspan').style.display = 'none'
	document.getElementById('decrypt').style.display = '';
	document.getElementById('filedrag').disabled = false;
}
